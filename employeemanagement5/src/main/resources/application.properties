spring.application.name=employeemanagement5
 
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/employeedb?ifNotExists=true&createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8090

# Logging
logging.level.org.springframework=INFO
logging.level.com.copilot.employeemanagement=DEBUG