# ── Server ────────────────────────────────────────────────────────────────────
server.port=8085

# ── H2 In-Memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:billingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── Mail (disabled for demo — intentional dep for Slide 5 upgrade-safety demo)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=billing@telecom.example.com
spring.mail.password=changeme
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.telecom=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
